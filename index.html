<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面積算定ツール — 平面図プロッター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#22304a;
  --ink-2:#3d4d6b;
  --paper:#f4f5f2;
  --panel:#ffffff;
  --line:#d8dce3;
  --accent:#0e7c6b;
  --accent-soft:#e2f1ee;
  --calib:#e4572e;
  --calib-soft:#fdeae3;
  --warn:#b8860b;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'IBM Plex Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--paper);overflow:hidden}

/* ===== ヘッダー ===== */
header{
  height:52px;display:flex;align-items:center;gap:14px;padding:0 14px;
  background:var(--ink);color:#fff;
}
header .logo{display:flex;align-items:baseline;gap:8px;white-space:nowrap}
header .logo b{font-size:15px;font-weight:700;letter-spacing:.04em}
header .logo span{font-size:11px;color:#9fb0cc;font-family:var(--mono)}
header .spacer{flex:1}
.hbtn{
  appearance:none;border:1px solid #47597e;background:#2c3c5e;color:#fff;
  font-family:var(--sans);font-size:12.5px;padding:7px 12px;border-radius:6px;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
.hbtn:hover{background:#3a4d75}
.hbtn.primary{background:var(--accent);border-color:var(--accent)}
.hbtn.primary:hover{background:#0c6c5d}
.hbtn:disabled{opacity:.45;cursor:not-allowed}
.pageNav{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px}
.pageNav button{width:26px;height:26px;border-radius:5px;border:1px solid #47597e;background:#2c3c5e;color:#fff;cursor:pointer}
.pageNav button:disabled{opacity:.35;cursor:default}

/* 縮尺ステータス */
#scaleChip{
  font-family:var(--mono);font-size:11.5px;padding:6px 10px;border-radius:6px;
  background:#3a2c2c;color:#ffb59d;border:1px solid #6b4a3d;white-space:nowrap;
}
#scaleChip.set{background:#1f3d38;color:#8fe3d4;border-color:#2e6b60}

/* ===== レイアウト ===== */
#app{display:flex;height:calc(100% - 52px)}
#stageWrap{flex:1;position:relative;overflow:hidden;background:
  repeating-linear-gradient(0deg,transparent 0 23px,#e9eae6 23px 24px),
  repeating-linear-gradient(90deg,transparent 0 23px,#e9eae6 23px 24px),var(--paper);
}
canvas#stage{position:absolute;inset:0;cursor:crosshair;touch-action:none}

/* ドロップゾーン */
#dropZone{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:var(--ink-2);z-index:5;text-align:center;padding:20px;
}
#dropZone .frame{
  border:2px dashed #b9c0cc;border-radius:14px;padding:52px 68px;background:rgba(255,255,255,.75);
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
#dropZone h2{font-size:17px;font-weight:700}
#dropZone p{font-size:12.5px;line-height:1.8;color:#6b7890}
#dropZone.hidden{display:none}
#dropZone.dragover .frame{border-color:var(--accent);background:var(--accent-soft)}

/* ツールバー(フローティング) */
#toolbar{
  position:absolute;top:14px;left:14px;z-index:10;display:flex;flex-direction:column;gap:4px;
  background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px;
  box-shadow:0 4px 16px rgba(34,48,74,.12);
}
.tool{
  width:42px;height:42px;border:none;background:transparent;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--ink-2);position:relative;
}
.tool:hover{background:#eef0f3}
.tool.active{background:var(--ink);color:#fff}
.tool.active.calib{background:var(--calib)}
.tool svg{width:20px;height:20px}
.tool .kbd{
  position:absolute;right:3px;bottom:2px;font-family:var(--mono);font-size:8.5px;color:#9aa5b5;
}
.tool.active .kbd{color:rgba(255,255,255,.6)}
.tool[data-tip]:hover::after{
  content:attr(data-tip);position:absolute;left:50px;top:50%;transform:translateY(-50%);
  background:var(--ink);color:#fff;font-size:11px;padding:5px 9px;border-radius:6px;white-space:nowrap;z-index:20;
}
#toolbar hr{border:none;border-top:1px solid var(--line);margin:2px 4px}

/* ズームコントロール */
#zoomCtl{
  position:absolute;bottom:14px;left:14px;z-index:10;display:flex;align-items:center;gap:2px;
  background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:3px;
  box-shadow:0 4px 16px rgba(34,48,74,.12);font-family:var(--mono);font-size:11.5px;
}
#zoomCtl button{width:30px;height:30px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:15px;color:var(--ink-2)}
#zoomCtl button:hover{background:#eef0f3}
#zoomCtl .pct{min-width:52px;text-align:center;color:var(--ink-2)}

/* ガイドメッセージ */
#hint{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:10;
  background:rgba(34,48,74,.92);color:#fff;font-size:12.5px;padding:8px 16px;border-radius:20px;
  pointer-events:none;transition:opacity .2s;max-width:70%;text-align:center;
}
#hint.off{opacity:0}
#hint.calib{background:rgba(228,87,46,.94)}

/* ===== サイドパネル ===== */
#side{
  width:308px;background:var(--panel);border-left:1px solid var(--line);
  display:flex;flex-direction:column;
}
#side .head{
  padding:14px 16px 10px;border-bottom:1px solid var(--line);
}
#side .head h3{font-size:13px;font-weight:700;letter-spacing:.03em}
#side .head .sub{font-size:11px;color:#8b96a8;margin-top:2px;font-family:var(--mono)}
#shapeList{flex:1;overflow-y:auto;padding:8px}
.shapeItem{
  border:1px solid var(--line);border-radius:8px;padding:9px 10px;margin-bottom:7px;cursor:pointer;
  display:flex;flex-direction:column;gap:5px;background:#fff;
}
.shapeItem:hover{border-color:#aeb8c8}
.shapeItem.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.shapeItem .row1{display:flex;align-items:center;gap:8px}
.shapeItem .sw{width:11px;height:11px;border-radius:3px;flex:none}
.shapeItem input.nm{
  flex:1;border:none;font-family:var(--sans);font-size:12.5px;font-weight:500;color:var(--ink);
  background:transparent;padding:2px 3px;border-radius:4px;min-width:0;
}
.shapeItem input.nm:focus{outline:1px solid var(--accent);background:#fafffe}
.shapeItem .del{
  border:none;background:transparent;color:#b3bcc9;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;flex:none;
}
.shapeItem .del:hover{color:#d24545;background:#fdeeee}
.shapeItem .row2{display:flex;justify-content:space-between;align-items:baseline;padding-left:19px}
.shapeItem .typ{font-size:10.5px;color:#8b96a8}
.shapeItem .ar{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent)}
.shapeItem .ar small{font-size:10px;color:#8b96a8;font-weight:500;margin-left:4px}
#emptyList{padding:30px 16px;text-align:center;color:#9aa5b5;font-size:12px;line-height:2}

/* 合計フッター */
#totalBar{
  border-top:1px solid var(--line);padding:13px 16px;background:#fafbf9;
}
#totalBar .lbl{font-size:11px;color:#8b96a8;letter-spacing:.05em}
#totalBar .val{font-family:var(--mono);font-size:21px;font-weight:600;color:var(--ink);margin-top:2px}
#totalBar .val small{font-size:11px;color:#8b96a8;font-weight:500;margin-left:5px}
#totalBar .tsubo{font-family:var(--mono);font-size:11.5px;color:#8b96a8;margin-top:1px}

/* ===== モーダル ===== */
.modalBack{
  position:fixed;inset:0;background:rgba(20,28,44,.45);display:flex;align-items:center;justify-content:center;z-index:100;
}
.modalBack.hidden{display:none}
.modal{
  background:#fff;border-radius:12px;padding:22px 24px;width:340px;box-shadow:0 12px 40px rgba(0,0,0,.25);
}
.modal h3{font-size:14.5px;font-weight:700;margin-bottom:4px}
.modal .desc{font-size:12px;color:#6b7890;margin-bottom:14px;line-height:1.7}
.modal .inRow{display:flex;gap:8px;margin-bottom:16px}
.modal input[type=number]{
  flex:1;border:1px solid var(--line);border-radius:7px;padding:10px 12px;font-family:var(--mono);
  font-size:16px;min-width:0;
}
.modal input[type=number]:focus{outline:2px solid var(--accent);border-color:transparent}
.modal select{
  border:1px solid var(--line);border-radius:7px;padding:0 10px;font-family:var(--sans);font-size:13px;background:#fff;cursor:pointer;
}
.modal .btns{display:flex;gap:8px;justify-content:flex-end}
.modal .btns button{
  font-family:var(--sans);font-size:13px;padding:9px 18px;border-radius:7px;cursor:pointer;border:1px solid var(--line);background:#fff;
}
.modal .btns .ok{background:var(--calib);border-color:var(--calib);color:#fff;font-weight:600}
.modal .btns .ok:hover{background:#cf4a24}
.modal .pxInfo{font-family:var(--mono);font-size:11px;color:#9aa5b5;margin-bottom:12px}

/* トースト */
#toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;
  background:var(--ink);color:#fff;font-size:12.5px;padding:10px 20px;border-radius:8px;
  opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.25);
}
#toast.show{opacity:1}

@media (max-width:760px){
  #side{width:230px}
  header .logo span{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo"><b>面積算定ツール</b><span>AREA PLOTTER</span></div>
  <button class="hbtn" id="btnOpen">📄 図面を開く</button>
  <div class="pageNav" id="pageNav" style="display:none">
    <button id="pgPrev">‹</button>
    <span id="pgLabel">1 / 1</span>
    <button id="pgNext">›</button>
  </div>
  <div class="spacer"></div>
  <div id="scaleChip">縮尺未設定 — 基準線を引いてください</div>
  <button class="hbtn primary" id="btnExport" disabled>⬇ Excelエクスポート</button>
</header>

<div id="app">
  <div id="stageWrap">
    <canvas id="stage"></canvas>

    <div id="dropZone">
      <div class="frame">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#8b96a8" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="12" y1="12" x2="12" y2="18"/>
        </svg>
        <h2>平面図PDFをドロップ / クリックして選択</h2>
        <p>PDF・PNG・JPG に対応<br>読み込み後、① 基準線ツールで寸法線をなぞり実寸を入力 → ② 四角・多角形で面積を計測</p>
      </div>
    </div>

    <div id="toolbar" style="display:none">
      <button class="tool" data-tool="select" data-tip="選択 / 移動 (V)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 3l7 17 2.5-7L21 10.5z" stroke-linejoin="round"/></svg>
        <span class="kbd">V</span>
      </button>
      <button class="tool calib" data-tool="calib" data-tip="基準線(縮尺設定) (C)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 20L20 3"/><path d="M6.5 16.5l1.8 1.8M10 13l1.8 1.8M13.5 9.5l1.8 1.8M17 6l1.8 1.8"/></svg>
        <span class="kbd">C</span>
      </button>
      <hr>
      <button class="tool" data-tool="rect" data-tip="四角形 (R)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>
        <span class="kbd">R</span>
      </button>
      <button class="tool" data-tool="poly" data-tip="フリーフォーム(多角形) (P)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 4l13 4-3 12-13-2 1-9z" stroke-linejoin="round"/><circle cx="7" cy="4" r="1.6" fill="currentColor" stroke="none"/><circle cx="20" cy="8" r="1.6" fill="currentColor" stroke="none"/><circle cx="17" cy="20" r="1.6" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.6" fill="currentColor" stroke="none"/><circle cx="5" cy="9" r="1.6" fill="currentColor" stroke="none"/></svg>
        <span class="kbd">P</span>
      </button>
      <hr>
      <button class="tool" data-tool="pan" data-tip="手のひら(移動) (Space)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 11V7a1.5 1.5 0 0 0-3 0v4V5.5a1.5 1.5 0 0 0-3 0V11V6.5a1.5 1.5 0 0 0-3 0V13l-1.7-2.3a1.5 1.5 0 0 0-2.4 1.8L8.5 19a5 5 0 0 0 4 2h1.5a4 4 0 0 0 4-4z"/></svg>
      </button>
    </div>

    <div id="zoomCtl" style="display:none">
      <button id="zOut" title="縮小">−</button>
      <span class="pct" id="zPct">100%</span>
      <button id="zIn" title="拡大">＋</button>
      <button id="zFit" title="全体表示" style="font-size:11px;width:38px">Fit</button>
      <button id="rotL" title="左に90°回転" style="font-size:13px">⟲</button>
      <button id="rotR" title="右に90°回転" style="font-size:13px">⟳</button>
    </div>

    <div id="hint" class="off"></div>
  </div>

  <aside id="side">
    <div class="head">
      <h3>計測図形</h3>
      <div class="sub" id="sideSub">— 図形なし</div>
    </div>
    <div id="shapeList"><div id="emptyList">図形はまだありません<br>四角形 (R) または多角形 (P) で作図します</div></div>
    <div id="totalBar">
      <div class="lbl">合計面積(表示ページ)</div>
      <div class="val" id="totalVal">0.00<small>m²</small></div>
      <div class="tsubo" id="totalTsubo">0.00 坪</div>
    </div>
  </aside>
</div>

<!-- 縮尺入力モーダル -->
<div class="modalBack hidden" id="calibModal">
  <div class="modal">
    <h3>基準線の実寸を入力</h3>
    <div class="desc">図面上に引いた線の実際の長さを入力してください。この値からページ全体の縮尺を計算します。</div>
    <div class="pxInfo" id="calibPx">線の長さ: — px</div>
    <div class="inRow">
      <input type="number" id="calibLen" step="any" min="0" placeholder="例: 9100" autocomplete="off">
      <select id="calibUnit">
        <option value="mm" selected>mm</option>
        <option value="m">m</option>
      </select>
    </div>
    <div class="btns">
      <button id="calibCancel">キャンセル</button>
      <button class="ok" id="calibOk">縮尺を設定</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="fileInput" accept="application/pdf,image/png,image/jpeg" style="display:none">

<script>
'use strict';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const TSUBO = 3.30578512; // m² per 坪
const PALETTE = ['#0e7c6b','#2f6db3','#b3652f','#7a4fb3','#b32f6d','#5f8a2f','#2f9db3','#a38a1f'];

/* ---------- 状態 ---------- */
const S = {
  fileName: '',
  isPdf: false,
  pdfDoc: null,
  pageNum: 1,
  numPages: 1,
  baseCanvas: null,        // 高解像度レンダリング結果
  view: { zoom: 1, panX: 0, panY: 0 },
  tool: 'select',
  pages: {},               // pageNum -> {calib:{p1,p2,meters,label}, shapes:[], seq:{rect,poly}}
  drawing: null,           // 作図中の一時状態
  selId: null,
  dragging: null,          // {shape, startWorld, orig}
  panning: null,
  spaceHeld: false,
  mouseWorld: null,
  pendingCalib: null,
};

function pageData(n = S.pageNum) {
  if (!S.pages[n]) S.pages[n] = { calib: null, shapes: [], seq: { rect: 0, poly: 0 }, rot: 0 };
  return S.pages[n];
}

/* ---------- DOM ---------- */
const $ = id => document.getElementById(id);
const stage = $('stage'), wrap = $('stageWrap'), ctx = stage.getContext('2d');
const hint = $('hint');

/* ---------- ユーティリティ ---------- */
function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm = setTimeout(() => t.classList.remove('show'), 2600);
}
function setHint(msg, calibStyle) {
  if (!msg) { hint.classList.add('off'); return; }
  hint.textContent = msg;
  hint.classList.remove('off');
  hint.classList.toggle('calib', !!calibStyle);
}
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function screenToWorld(sx, sy) {
  return { x: (sx - S.view.panX) / S.view.zoom, y: (sy - S.view.panY) / S.view.zoom };
}
function worldToScreen(p) {
  return { x: p.x * S.view.zoom + S.view.panX, y: p.y * S.view.zoom + S.view.panY };
}
function evtPos(e) {
  const r = stage.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function snapAxis(from, to) { // Shiftで水平/垂直スナップ
  const dx = Math.abs(to.x - from.x), dy = Math.abs(to.y - from.y);
  return dx > dy ? { x: to.x, y: from.y } : { x: from.x, y: to.y };
}
function polyArea(pts) { // shoelace(基準座標px²)
  let s = 0;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    s += a.x * b.y - b.x * a.y;
  }
  return Math.abs(s) / 2;
}
function centroid(pts) {
  let a = 0, cx = 0, cy = 0;
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i], q = pts[(i + 1) % pts.length];
    const cr = p.x * q.y - q.x * p.y;
    a += cr; cx += (p.x + q.x) * cr; cy += (p.y + q.y) * cr;
  }
  if (Math.abs(a) < 1e-6) {
    const n = pts.length;
    return { x: pts.reduce((s, p) => s + p.x, 0) / n, y: pts.reduce((s, p) => s + p.y, 0) / n };
  }
  a *= 0.5;
  return { x: cx / (6 * a), y: cy / (6 * a) };
}
function pointInPoly(pt, pts) {
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const a = pts[i], b = pts[j];
    if ((a.y > pt.y) !== (b.y > pt.y) &&
        pt.x < (b.x - a.x) * (pt.y - a.y) / (b.y - a.y) + a.x) inside = !inside;
  }
  return inside;
}
function metersPerUnit() { // 基準座標1pxあたりのメートル
  const c = pageData().calib;
  if (!c) return null;
  const d = dist(c.p1, c.p2);
  return d > 0 ? c.meters / d : null;
}
function areaM2(shape) {
  const mpu = metersPerUnit();
  if (mpu == null) return null;
  return polyArea(shape.points) * mpu * mpu;
}
function fmtArea(v) { return v == null ? '—' : v.toLocaleString('ja-JP', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

/* ---------- キャンバスサイズ ---------- */
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  stage.width = wrap.clientWidth * dpr;
  stage.height = wrap.clientHeight * dpr;
  stage.style.width = wrap.clientWidth + 'px';
  stage.style.height = wrap.clientHeight + 'px';
  draw();
}
window.addEventListener('resize', resizeCanvas);

/* ---------- ファイル読み込み ---------- */
$('btnOpen').onclick = () => $('fileInput').click();
$('dropZone').onclick = () => $('fileInput').click();
$('fileInput').onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); e.target.value = ''; };

wrap.addEventListener('dragover', e => { e.preventDefault(); $('dropZone').classList.add('dragover'); });
wrap.addEventListener('dragleave', () => $('dropZone').classList.remove('dragover'));
wrap.addEventListener('drop', e => {
  e.preventDefault(); $('dropZone').classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

async function loadFile(file) {
  S.fileName = file.name;
  S.pages = {}; S.selId = null; S.drawing = null;
  try {
    if (file.type === 'application/pdf' || /\.pdf$/i.test(file.name)) {
      const buf = await file.arrayBuffer();
      S.pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise;
      S.isPdf = true;
      S.numPages = S.pdfDoc.numPages;
      S.pageNum = 1;
      await renderPage();
    } else {
      const img = new Image();
      img.src = URL.createObjectURL(file);
      await img.decode();
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      URL.revokeObjectURL(img.src);
      S.baseCanvas = c;
      S.isPdf = false; S.pdfDoc = null; S.numPages = 1; S.pageNum = 1;
      afterLoad();
    }
  } catch (err) {
    console.error(err);
    toast('読み込みに失敗しました: ' + err.message);
  }
}

async function renderPage() {
  const page = await S.pdfDoc.getPage(S.pageNum);
  const vp1 = page.getViewport({ scale: 1 });
  const scale = Math.min(4, Math.max(2, 2600 / vp1.width)); // 高解像度で固定レンダリング
  const vp = page.getViewport({ scale });
  const c = document.createElement('canvas');
  c.width = Math.floor(vp.width); c.height = Math.floor(vp.height);
  await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
  // ページ切替時、保存済みの回転角を再適用(座標は既に回転後の空間で保持)
  let out = c;
  const rot = pageData().rot || 0;
  for (let i = 0; i < rot / 90; i++) out = rotateCanvas90(out, true);
  S.baseCanvas = out;
  afterLoad();
}

function afterLoad() {
  $('dropZone').classList.add('hidden');
  $('toolbar').style.display = 'flex';
  $('zoomCtl').style.display = 'flex';
  $('pageNav').style.display = S.numPages > 1 ? 'flex' : 'none';
  $('pgLabel').textContent = `${S.pageNum} / ${S.numPages}`;
  fitView();
  setTool(pageData().calib ? 'rect' : 'calib');
  if (!pageData().calib) setHint('まず基準線を引きます — 図面の寸法線の両端をクリック(Shiftで水平/垂直)', true);
  refreshUI();
}

/* ページ切替 */
$('pgPrev').onclick = () => gotoPage(S.pageNum - 1);
$('pgNext').onclick = () => gotoPage(S.pageNum + 1);
async function gotoPage(n) {
  if (!S.isPdf || n < 1 || n > S.numPages) return;
  S.pageNum = n; S.selId = null; S.drawing = null;
  await renderPage();
}

/* ---------- ビュー ---------- */
function fitView() {
  if (!S.baseCanvas) return;
  const pad = 36;
  const zw = (wrap.clientWidth - pad * 2) / S.baseCanvas.width;
  const zh = (wrap.clientHeight - pad * 2) / S.baseCanvas.height;
  S.view.zoom = Math.min(zw, zh);
  S.view.panX = (wrap.clientWidth - S.baseCanvas.width * S.view.zoom) / 2;
  S.view.panY = (wrap.clientHeight - S.baseCanvas.height * S.view.zoom) / 2;
  draw();
}
function zoomAt(sx, sy, factor) {
  const w = screenToWorld(sx, sy);
  S.view.zoom = Math.min(12, Math.max(0.05, S.view.zoom * factor));
  S.view.panX = sx - w.x * S.view.zoom;
  S.view.panY = sy - w.y * S.view.zoom;
  draw();
}
$('zIn').onclick = () => zoomAt(wrap.clientWidth / 2, wrap.clientHeight / 2, 1.25);
$('zOut').onclick = () => zoomAt(wrap.clientWidth / 2, wrap.clientHeight / 2, 0.8);
$('zFit').onclick = fitView;
$('rotL').onclick = () => rotatePage(false);
$('rotR').onclick = () => rotatePage(true);

/* ---------- 回転 ---------- */
function rotateCanvas90(src, cw) {
  const c = document.createElement('canvas');
  c.width = src.height; c.height = src.width;
  const g = c.getContext('2d');
  if (cw) { g.translate(c.width, 0); g.rotate(Math.PI / 2); }
  else { g.translate(0, c.height); g.rotate(-Math.PI / 2); }
  g.drawImage(src, 0, 0);
  return c;
}
function rotatePage(cw) {
  if (!S.baseCanvas) return;
  const W = S.baseCanvas.width, H = S.baseCanvas.height;
  S.baseCanvas = rotateCanvas90(S.baseCanvas, cw);
  const pd = pageData();
  pd.rot = ((pd.rot || 0) + (cw ? 90 : 270)) % 360;
  // 既存の図形・基準線も同じ回転で座標変換(面積は不変)
  const f = cw ? p => ({ x: H - p.y, y: p.x }) : p => ({ x: p.y, y: W - p.x });
  for (const sh of pd.shapes) sh.points = sh.points.map(f);
  if (pd.calib) { pd.calib.p1 = f(pd.calib.p1); pd.calib.p2 = f(pd.calib.p2); }
  if (S.pendingCalib) { S.pendingCalib.p1 = f(S.pendingCalib.p1); S.pendingCalib.p2 = f(S.pendingCalib.p2); }
  S.drawing = null;
  S.dragging = null;
  fitView();
  refreshUI();
}

wrap.addEventListener('wheel', e => {
  if (!S.baseCanvas) return;
  e.preventDefault();
  const p = evtPos(e);
  zoomAt(p.x, p.y, e.deltaY < 0 ? 1.12 : 0.89);
}, { passive: false });

/* ---------- ツール ---------- */
function setTool(t) {
  S.tool = t;
  S.drawing = null;
  document.querySelectorAll('.tool').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
  stage.style.cursor = t === 'pan' ? 'grab' : (t === 'select' ? 'default' : 'crosshair');
  if (t === 'calib') setHint('基準線: 始点 → 終点をクリック(Shiftで水平/垂直スナップ)', true);
  else if (t === 'rect') setHint('四角形: ドラッグして範囲を指定');
  else if (t === 'poly') setHint('多角形: クリックで頂点を追加 / ダブルクリック・Enterで確定 / Escで取消');
  else if (t === 'select') setHint('選択: クリックで選択 / 図形をドラッグで移動 / □頂点をドラッグでサイズ変更');
  else setHint('');
  draw();
}
document.querySelectorAll('.tool').forEach(b => b.onclick = () => setTool(b.dataset.tool));

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { S.spaceHeld = true; stage.style.cursor = 'grab'; e.preventDefault(); return; }
  if (e.key === 'v' || e.key === 'V') setTool('select');
  if (e.key === 'c' || e.key === 'C') setTool('calib');
  if (e.key === 'r' || e.key === 'R') setTool('rect');
  if (e.key === 'p' || e.key === 'P') setTool('poly');
  if (e.key === 'Enter' && S.drawing?.type === 'poly') finishPoly();
  if (e.key === 'Escape') { S.drawing = null; draw(); }
  if ((e.key === 'Delete' || e.key === 'Backspace') && S.selId != null) deleteShape(S.selId);
  if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault();
    if (S.drawing?.type === 'poly' && S.drawing.points.length > 0) { S.drawing.points.pop(); if (!S.drawing.points.length) S.drawing = null; draw(); }
    else { const sh = pageData().shapes; if (sh.length) { const rm = sh.pop(); if (S.selId === rm.id) S.selId = null; refreshUI(); toast('直前の図形を取り消しました'); } }
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { S.spaceHeld = false; if (!S.panning) stage.style.cursor = S.tool === 'pan' ? 'grab' : (S.tool === 'select' ? 'default' : 'crosshair'); }
});

/* ---------- マウス操作 ---------- */
stage.addEventListener('mousedown', e => {
  if (!S.baseCanvas) return;
  const sp = evtPos(e);
  const w = screenToWorld(sp.x, sp.y);

  // パン(スペース / 中ボタン / panツール)
  if (S.spaceHeld || e.button === 1 || S.tool === 'pan') {
    S.panning = { sx: sp.x, sy: sp.y, px: S.view.panX, py: S.view.panY };
    stage.style.cursor = 'grabbing';
    e.preventDefault();
    return;
  }
  if (e.button !== 0) return;

  if (S.tool === 'calib') {
    if (!S.drawing) {
      S.drawing = { type: 'calib', p1: w, p2: w };
    } else {
      let p2 = e.shiftKey ? snapAxis(S.drawing.p1, w) : w;
      if (dist(S.drawing.p1, p2) < 3) return;
      S.pendingCalib = { p1: S.drawing.p1, p2 };
      S.drawing = null;
      openCalibModal();
    }
    draw();
    return;
  }

  if (S.tool === 'rect') {
    S.drawing = { type: 'rect', p1: w, p2: w };
    draw();
    return;
  }

  if (S.tool === 'poly') {
    if (!S.drawing) S.drawing = { type: 'poly', points: [] };
    const pts = S.drawing.points;
    // 始点近くをクリックで閉じる
    if (pts.length >= 3) {
      const s0 = worldToScreen(pts[0]);
      if (Math.hypot(s0.x - sp.x, s0.y - sp.y) < 10) { finishPoly(); return; }
    }
    let p = w;
    if (e.shiftKey && pts.length) p = snapAxis(pts[pts.length - 1], w);
    pts.push(p);
    draw();
    return;
  }

  if (S.tool === 'select') {
    // 選択中図形の頂点ハンドルを優先判定(サイズ変更)
    if (S.selId != null) {
      const sel = pageData().shapes.find(s => s.id === S.selId);
      if (sel) {
        const vi = hitVertex(sel, sp);
        if (vi >= 0) {
          S.dragging = { mode: 'vertex', shape: sel, idx: vi, orig: sel.points.map(p => ({ ...p })) };
          return;
        }
      }
    }
    const sh = hitShape(w);
    S.selId = sh ? sh.id : null;
    if (sh) S.dragging = { mode: 'move', shape: sh, start: w, orig: sh.points.map(p => ({ ...p })) };
    refreshUI();
  }
});

stage.addEventListener('mousemove', e => {
  if (!S.baseCanvas) return;
  const sp = evtPos(e);
  const w = screenToWorld(sp.x, sp.y);
  S.mouseWorld = e.shiftKey && S.drawing ? null : w;

  if (S.panning) {
    S.view.panX = S.panning.px + (sp.x - S.panning.sx);
    S.view.panY = S.panning.py + (sp.y - S.panning.sy);
    draw();
    return;
  }
  if (S.dragging) {
    const d = S.dragging;
    if (d.mode === 'vertex') {
      applyVertexDrag(d, w, e.shiftKey);
    } else {
      const dx = w.x - d.start.x, dy = w.y - d.start.y;
      d.shape.points = d.orig.map(p => ({ x: p.x + dx, y: p.y + dy }));
    }
    refreshUI(false);
    draw();
    return;
  }
  if (S.drawing) {
    if (S.drawing.type === 'calib') S.drawing.p2 = e.shiftKey ? snapAxis(S.drawing.p1, w) : w;
    if (S.drawing.type === 'rect') S.drawing.p2 = w;
    if (S.drawing.type === 'poly') {
      const pts = S.drawing.points;
      S.drawing.cursor = (e.shiftKey && pts.length) ? snapAxis(pts[pts.length - 1], w) : w;
    }
    draw();
  } else if (S.tool === 'select') {
    let cur = 'default';
    if (S.selId != null) {
      const sel = pageData().shapes.find(s => s.id === S.selId);
      if (sel && hitVertex(sel, sp) >= 0) cur = 'crosshair';
    }
    if (cur === 'default' && hitShape(w)) cur = 'move';
    stage.style.cursor = cur;
  }
});

window.addEventListener('mouseup', () => {
  if (S.panning) {
    S.panning = null;
    stage.style.cursor = S.spaceHeld || S.tool === 'pan' ? 'grab' : (S.tool === 'select' ? 'default' : 'crosshair');
  }
  if (S.dragging) { S.dragging = null; refreshUI(); }
  if (S.drawing?.type === 'rect') {
    const { p1, p2 } = S.drawing;
    S.drawing = null;
    if (Math.abs(p1.x - p2.x) > 4 && Math.abs(p1.y - p2.y) > 4) {
      addShape('rect', [
        { x: p1.x, y: p1.y }, { x: p2.x, y: p1.y },
        { x: p2.x, y: p2.y }, { x: p1.x, y: p2.y },
      ]);
    } else draw();
  }
});

stage.addEventListener('dblclick', e => {
  if (S.drawing?.type === 'poly') {
    // ダブルクリックの2打目で追加された頂点を除去
    const pts = S.drawing.points;
    if (pts.length >= 2) {
      const last = pts[pts.length - 1], prev = pts[pts.length - 2];
      if (dist(last, prev) < 2 / S.view.zoom) pts.pop();
    }
    finishPoly();
  }
});

function finishPoly() {
  if (!S.drawing || S.drawing.points.length < 3) { toast('頂点が3点以上必要です'); return; }
  const pts = S.drawing.points;
  S.drawing = null;
  addShape('poly', pts);
}

function hitShape(w) {
  const sh = pageData().shapes;
  for (let i = sh.length - 1; i >= 0; i--) if (pointInPoly(w, sh[i].points)) return sh[i];
  return null;
}
function hitVertex(shape, sp) { // sp: 画面座標。近い頂点のインデックスを返す
  for (let i = 0; i < shape.points.length; i++) {
    const s = worldToScreen(shape.points[i]);
    if (Math.hypot(s.x - sp.x, s.y - sp.y) < 9) return i;
  }
  return -1;
}
function applyVertexDrag(d, w, shift) {
  const sh = d.shape, idx = d.idx, o = d.orig;
  if (sh.type === 'rect' && o.length === 4) {
    // 対角の頂点を固定し、矩形を維持したままサイズ変更
    const opp = o[(idx + 2) % 4];
    const n1 = (idx + 1) % 4, n2 = (idx + 3) % 4;
    const pts = sh.points;
    pts[idx] = { x: w.x, y: w.y };
    pts[(idx + 2) % 4] = { ...opp };
    if (Math.abs(o[n1].x - o[idx].x) < 0.001) {
      pts[n1] = { x: w.x, y: opp.y };
      pts[n2] = { x: opp.x, y: w.y };
    } else {
      pts[n1] = { x: opp.x, y: w.y };
      pts[n2] = { x: w.x, y: opp.y };
    }
  } else {
    // 多角形は掴んだ頂点のみ移動(Shiftで前の頂点に対し水平/垂直)
    let p = w;
    if (shift) {
      const prev = o[(idx - 1 + o.length) % o.length];
      p = snapAxis(prev, w);
    }
    sh.points[idx] = { x: p.x, y: p.y };
  }
}

/* ---------- 図形 ---------- */
let idSeq = 1;
function addShape(type, points) {
  const pd = pageData();
  pd.seq[type]++;
  const name = (type === 'rect' ? '四角形' : '多角形') + pd.seq[type];
  const shape = { id: idSeq++, type, points, name, color: PALETTE[(pd.shapes.length) % PALETTE.length] };
  pd.shapes.push(shape);
  S.selId = shape.id;
  refreshUI();
  if (metersPerUnit() == null) toast('縮尺が未設定です。基準線ツール(C)で縮尺を設定してください');
}
function deleteShape(id) {
  const pd = pageData();
  pd.shapes = pd.shapes.filter(s => s.id !== id);
  if (S.selId === id) S.selId = null;
  refreshUI();
}

/* ---------- 縮尺モーダル ---------- */
function openCalibModal() {
  const d = dist(S.pendingCalib.p1, S.pendingCalib.p2);
  $('calibPx').textContent = `線の長さ: ${d.toFixed(1)} px(図面座標)`;
  $('calibLen').value = '';
  $('calibModal').classList.remove('hidden');
  setTimeout(() => $('calibLen').focus(), 50);
}
$('calibCancel').onclick = () => { $('calibModal').classList.add('hidden'); S.pendingCalib = null; draw(); };
$('calibOk').onclick = applyCalib;
$('calibLen').addEventListener('keydown', e => { if (e.key === 'Enter') applyCalib(); });

function applyCalib() {
  const v = parseFloat($('calibLen').value);
  if (!(v > 0)) { toast('正の数値を入力してください'); return; }
  const unit = $('calibUnit').value;
  const meters = unit === 'mm' ? v / 1000 : v;
  pageData().calib = { p1: S.pendingCalib.p1, p2: S.pendingCalib.p2, meters, label: `${v.toLocaleString('ja-JP')} ${unit}` };
  S.pendingCalib = null;
  $('calibModal').classList.add('hidden');
  toast('縮尺を設定しました');
  setTool('rect');
  refreshUI();
}

/* ---------- 描画 ---------- */
function draw() {
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, stage.width, stage.height);
  if (!S.baseCanvas) return;

  const { zoom, panX, panY } = S.view;
  ctx.setTransform(dpr * zoom, 0, 0, dpr * zoom, dpr * panX, dpr * panY);
  ctx.imageSmoothingEnabled = zoom < 1;
  // 図面(影付き)
  ctx.save();
  ctx.shadowColor = 'rgba(34,48,74,.18)'; ctx.shadowBlur = 18 / zoom; ctx.shadowOffsetY = 4 / zoom;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, S.baseCanvas.width, S.baseCanvas.height);
  ctx.restore();
  ctx.drawImage(S.baseCanvas, 0, 0);

  const lw = 1 / zoom;
  const pd = pageData();

  // 図形
  for (const sh of pd.shapes) {
    const sel = sh.id === S.selId;
    ctx.beginPath();
    sh.points.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
    ctx.closePath();
    ctx.fillStyle = hexA(sh.color, sel ? 0.30 : 0.18);
    ctx.fill();
    ctx.strokeStyle = sh.color;
    ctx.lineWidth = (sel ? 2.5 : 1.6) * lw;
    ctx.stroke();
    if (sel) for (const p of sh.points) drawHandle(p, sh.color, zoom);
  }

  // 基準線
  if (pd.calib) drawCalibLine(pd.calib.p1, pd.calib.p2, zoom, pd.calib.label);
  if (S.pendingCalib) drawCalibLine(S.pendingCalib.p1, S.pendingCalib.p2, zoom, null);

  // 作図中
  if (S.drawing) {
    ctx.setLineDash([6 / zoom, 4 / zoom]);
    if (S.drawing.type === 'calib') drawCalibLine(S.drawing.p1, S.drawing.p2, zoom, null, true);
    if (S.drawing.type === 'rect') {
      const { p1, p2 } = S.drawing;
      ctx.strokeStyle = '#0e7c6b'; ctx.lineWidth = 1.8 / zoom;
      ctx.fillStyle = 'rgba(14,124,107,.12)';
      ctx.beginPath();
      ctx.rect(Math.min(p1.x, p2.x), Math.min(p1.y, p2.y), Math.abs(p2.x - p1.x), Math.abs(p2.y - p1.y));
      ctx.fill(); ctx.stroke();
    }
    if (S.drawing.type === 'poly' && S.drawing.points.length) {
      const pts = S.drawing.points;
      ctx.strokeStyle = '#0e7c6b'; ctx.lineWidth = 1.8 / zoom;
      ctx.beginPath();
      pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      if (S.drawing.cursor) ctx.lineTo(S.drawing.cursor.x, S.drawing.cursor.y);
      ctx.stroke();
      ctx.setLineDash([]);
      for (const p of pts) drawHandle(p, '#0e7c6b', zoom);
      // 始点クローズ目印
      if (pts.length >= 3) {
        ctx.beginPath();
        ctx.arc(pts[0].x, pts[0].y, 8 / zoom, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(14,124,107,.5)';
        ctx.lineWidth = 1.5 / zoom;
        ctx.stroke();
      }
    }
    ctx.setLineDash([]);
  }

  /* ラベル(画面座標で描画) */
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  for (const sh of pd.shapes) {
    const c = worldToScreen(centroid(sh.points));
    const a = areaM2(sh);
    const line1 = sh.name;
    const line2 = a == null ? '縮尺未設定' : fmtArea(a) + ' m²';
    drawLabel(c.x, c.y, line1, line2, sh.color, a == null);
  }
  // 基準線ラベル
  if (pd.calib) {
    const m = worldToScreen({ x: (pd.calib.p1.x + pd.calib.p2.x) / 2, y: (pd.calib.p1.y + pd.calib.p2.y) / 2 });
    drawPill(m.x, m.y - 16, '基準 ' + pd.calib.label, '#e4572e');
  }
}

function hexA(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}
function drawHandle(p, color, zoom) {
  const s = 4.5 / zoom;
  ctx.fillStyle = '#fff'; ctx.strokeStyle = color; ctx.lineWidth = 1.4 / zoom;
  ctx.beginPath(); ctx.rect(p.x - s, p.y - s, s * 2, s * 2); ctx.fill(); ctx.stroke();
}
function drawCalibLine(p1, p2, zoom, label, dashed) {
  ctx.strokeStyle = '#e4572e';
  ctx.lineWidth = 2.2 / zoom;
  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  // 端点の直交ティック
  const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x) + Math.PI / 2;
  const t = 7 / zoom;
  for (const p of [p1, p2]) {
    ctx.beginPath();
    ctx.moveTo(p.x - Math.cos(ang) * t, p.y - Math.sin(ang) * t);
    ctx.lineTo(p.x + Math.cos(ang) * t, p.y + Math.sin(ang) * t);
    ctx.stroke();
  }
}
function drawLabel(x, y, l1, l2, color, warn) {
  ctx.font = '600 12px "IBM Plex Mono", monospace';
  const w2 = ctx.measureText(l2).width;
  ctx.font = '500 10.5px "IBM Plex Sans JP", sans-serif';
  const w1 = ctx.measureText(l1).width;
  const w = Math.max(w1, w2) + 18, h = 36;
  const rx = x - w / 2, ry = y - h / 2;
  ctx.beginPath();
  roundRect(rx, ry, w, h, 6);
  ctx.fillStyle = 'rgba(255,255,255,.93)';
  ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#5b6779';
  ctx.font = '500 10.5px "IBM Plex Sans JP", sans-serif';
  ctx.fillText(l1, x, ry + 14);
  ctx.fillStyle = warn ? '#b8860b' : color;
  ctx.font = '600 12.5px "IBM Plex Mono", monospace';
  ctx.fillText(l2, x, ry + 29);
  ctx.textAlign = 'start';
}
function drawPill(x, y, text, color) {
  ctx.font = '600 11px "IBM Plex Sans JP", sans-serif';
  const w = ctx.measureText(text).width + 16, h = 20;
  ctx.beginPath(); roundRect(x - w / 2, y - h / 2, w, h, 10);
  ctx.fillStyle = color; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText(text, x, y + 4);
  ctx.textAlign = 'start';
}
function roundRect(x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* ---------- サイドパネル / ステータス ---------- */
function refreshUI(redrawList = true) {
  const pd = pageData();
  // 縮尺チップ
  const mpu = metersPerUnit();
  const chip = $('scaleChip');
  if (mpu != null) {
    chip.textContent = `縮尺設定済 (基準 ${pd.calib.label})`;
    chip.classList.add('set');
  } else {
    chip.textContent = '縮尺未設定 — 基準線を引いてください';
    chip.classList.remove('set');
  }
  $('pgLabel').textContent = `${S.pageNum} / ${S.numPages}`;
  $('pgPrev').disabled = S.pageNum <= 1;
  $('pgNext').disabled = S.pageNum >= S.numPages;

  // リスト
  if (redrawList) {
    const list = $('shapeList');
    list.innerHTML = '';
    if (!pd.shapes.length) {
      list.innerHTML = '<div id="emptyList">図形はまだありません<br>四角形 (R) または多角形 (P) で作図します</div>';
    } else {
      for (const sh of pd.shapes) {
        const a = areaM2(sh);
        const el = document.createElement('div');
        el.className = 'shapeItem' + (sh.id === S.selId ? ' sel' : '');
        el.innerHTML = `
          <div class="row1">
            <span class="sw" style="background:${sh.color}"></span>
            <input class="nm" value="${escHtml(sh.name)}" spellcheck="false">
            <button class="del" title="削除">✕</button>
          </div>
          <div class="row2">
            <span class="typ">${sh.type === 'rect' ? '四角形' : '多角形'} ・ ${sh.points.length}頂点</span>
            <span class="ar">${fmtArea(a)}<small>${a == null ? '' : 'm²'}</small></span>
          </div>`;
        el.onclick = e => {
          if (e.target.classList.contains('nm') || e.target.classList.contains('del')) return;
          S.selId = sh.id; refreshUI(); draw();
        };
        el.querySelector('.nm').addEventListener('input', e => { sh.name = e.target.value; draw(); });
        el.querySelector('.del').onclick = () => deleteShape(sh.id);
        list.appendChild(el);
      }
    }
  }

  // 合計
  let total = 0, ok = metersPerUnit() != null;
  for (const sh of pd.shapes) { const a = areaM2(sh); if (a != null) total += a; }
  $('totalVal').innerHTML = (ok ? fmtArea(total) : '—') + '<small>m²</small>';
  $('totalTsubo').textContent = ok ? (total / TSUBO).toLocaleString('ja-JP', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' 坪' : '';
  $('sideSub').textContent = pd.shapes.length ? `${pd.shapes.length} 図形 — ページ ${S.pageNum}` : '— 図形なし';

  $('btnExport').disabled = !Object.values(S.pages).some(p => p.shapes.length);
  draw();
}
function escHtml(s) { return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

/* ---------- Excelエクスポート ---------- */
$('btnExport').onclick = () => {
  const rows = [];
  rows.push(['面積算定結果']);
  rows.push(['図面ファイル', S.fileName]);
  rows.push(['出力日時', new Date().toLocaleString('ja-JP')]);
  rows.push([]);
  rows.push(['ページ', 'No.', '名称', '種類', '頂点数', '面積 (m²)', '面積 (坪)', '備考']);

  let grand = 0, anyUncalib = false;
  const pageNums = Object.keys(S.pages).map(Number).sort((a, b) => a - b);

  for (const pn of pageNums) {
    const pd = S.pages[pn];
    if (!pd.shapes.length) continue;
    const c = pd.calib;
    const mpu = c ? c.meters / dist(c.p1, c.p2) : null;
    let sub = 0;
    pd.shapes.forEach((sh, i) => {
      const a = mpu != null ? polyArea(sh.points) * mpu * mpu : null;
      if (a != null) { sub += a; grand += a; } else anyUncalib = true;
      rows.push([
        pn, i + 1, sh.name,
        sh.type === 'rect' ? '四角形' : '多角形',
        sh.points.length,
        a != null ? round2(a) : '縮尺未設定',
        a != null ? round2(a / TSUBO) : '',
        c ? `基準 ${c.label}` : '',
      ]);
    });
    rows.push([pn, '', `ページ ${pn} 小計`, '', '', round2(sub), round2(sub / TSUBO), '']);
  }
  rows.push([]);
  rows.push(['', '', '総合計', '', '', round2(grand), round2(grand / TSUBO), anyUncalib ? '※縮尺未設定の図形は合計に含まれません' : '']);

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{ wch: 7 }, { wch: 5 }, { wch: 22 }, { wch: 9 }, { wch: 7 }, { wch: 12 }, { wch: 12 }, { wch: 30 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '面積算定');
  const base = S.fileName.replace(/\.[^.]+$/, '') || '面積算定';
  XLSX.writeFile(wb, `${base}_面積算定.xlsx`);
  toast('Excelファイルを出力しました');
};
function round2(v) { return Math.round(v * 100) / 100; }

/* ---------- 初期化 ---------- */
resizeCanvas();
</script>
